# LiteLLM Configuration for Agnes AI Integration
# Routes gpt-4o requests to Agnes OpenAI-compatible API

model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/agnes-2.0-flash
      api_base: https://apihub.agnes-ai.com/v1
      api_key: os.environ/OPENAI_API_KEY
      max_tokens: 4096
      temperature: 0.7
